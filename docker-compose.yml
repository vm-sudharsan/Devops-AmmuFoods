version: '3.9'

services:

  backend:
    build:
      context: ./backend
    container_name: ammu-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: ammu-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend