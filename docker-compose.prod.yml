services:

  backend:
    image: sudharsanprakalathanvm/ammufoods-backend:latest
    container_name: ammu-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    image: sudharsanprakalathanvm/ammufoods-frontend:latest
    container_name: ammu-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped